# ICE 1 Full Trainset Configuration for Dissertation
# Front-powercar-discretized version for Chapter 8 preview studies.
#
# Geometry:
#   - Front powercar: 78.0 t split into 6 x 13.0 t nodes
#   - Middle cars: 12 x 51.4 t vehicle-level nodes
#   - Rear powercar: 78.0 t vehicle-level node
#   - Coupling gap: 0.5 m
#   - Total: 2*78 + 12*51.4 = 772.8 t
#
# The former 14-node vehicle-level idealisation lumped the complete leading
# powercar into the first impacting node.  That makes the initial contact peak
# scale with sqrt(78 t) and is therefore an upper-bound-type rigid-front
# assumption.  This file keeps the full trainset mass but resolves the leading
# powercar into six crushing nodes, so the first peak is governed by local
# front-vehicle crushing rather than by a 78 t front node.

case_name: ICE1_full_dissertation_front_discrete
notes: >
  ICE 1 full trainset for dissertation parametric studies.
  The leading powercar is discretized into six 13 t masses to avoid a
  misleading 78 t first-node contact peak.  The rear coaches remain
  vehicle-level masses because they mainly affect post-peak train dynamics.
  Aluminium crushing behavior with fy=15MN, uy=200mm.

# Train composition (19 masses): 6-node front powercar + 12 coaches + rear powercar.
n_masses: 19

masses:
  - 13000.0
  - 13000.0
  - 13000.0
  - 13000.0
  - 13000.0
  - 13000.0
