case_name: ICE1_trainset_front_discrete
notes: >
  ICE 1 full trainset with the leading powercar discretized into six 13 t
  masses.  This replaces the older 14 vehicle-level lumped version, where the
  complete 78 t front powercar was assigned to the first impacting node and
  therefore over-amplified the initial contact peak.  Coaches and the rear
  powercar remain vehicle-level masses.
